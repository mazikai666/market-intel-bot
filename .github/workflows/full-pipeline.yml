name: Full Market Intel Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: market-intel-pages
  cancel-in-progress: true

jobs:
  build-deploy-push:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure state file exists
        run: |
          if [ ! -f state.json ]; then
            echo '{"sent_links":[]}' > state.json
          fi
          cat state.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate report and push
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          REPORT_URL: https://mazikai666.github.io/market-intel-bot/
          DEFAULT_PIC_URL: https://mazikai666.github.io/market-intel-bot/cover.jpg
          PUSH_TO_WECOM: "true"
          TEST_NEWS: ""
          SOURCE_ARTICLE_URL: ""
        run: python main.py

      - name: Debug generated files
        if: always()
        run: |
          echo "==== current dir ===="
          pwd
          echo "==== ls root ===="
          ls -la
          echo "==== ls images ===="
          ls -la images || true
          echo "==== report_meta.json ===="
          cat report_meta.json || true
          echo "==== state.json ===="
          cat state.json || true

      - name: Prepare Pages files
        run: |
          mkdir -p _site/images
          cp report.html _site/index.html
          cp cover.jpg _site/cover.jpg
          cp -r images/. _site/images/ || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "Update pushed news state"
            git push
          fi
